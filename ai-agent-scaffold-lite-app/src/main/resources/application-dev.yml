server:
  port: 8091

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  config:
    import:
#      - classpath:agent/only-one-agent.yml
      - classpath:agent/practice-agent.yml
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://127.0.0.1:13306/xfg_frame_archetype?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  hikari:
    pool-name: Retail_HikariCP
    minimum-idle: 15
    idle-timeout: 180000
    maximum-pool-size: 25
    auto-commit: true
    max-lifetime: 1800000
    connection-timeout: 30000
    connection-test-query: SELECT 1
  type: com.zaxxer.hikari.HikariDataSource
  ai:
    openai:
      api-key: sk-7ecbf63d8c7f48489e820f22abbc9d3a
      base-url: https://api.deepseek.com

# MyBatis 配置【如需使用记得打开】
#mybatis:
#  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location:  classpath:/mybatis/config/mybatis-config.xml

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

# 口语陪练配置
practice:
  asr:
    base-url: https://apis.itedus.cn
    api-key: YOUR_OPENAI_API_KEY
    nls:
      app-key: YOUR_NLS_APP_KEY
      access-key-id: YOUR_ALIYUN_AK_ID
      access-key-secret: YOUR_ALIYUN_AK_SECRET
      gateway-url: wss://nls-gateway-cn-shanghai.aliyuncs.com/ws/v1
  tts:
    python-path: C:\Users\kqj\AppData\Local\Programs\Python\Python312\python.exe
    ffplay-path: C:\ffmpge\bin\ffplay.exe
    voice: en-US-JennyNeural
  iflytek:
    app-id: aa5f53e2         # 讯飞控制台 APPID
    api-key: 10ed6197def1ffa8ca32e0ae10c5fc61   # 讯飞 APIKey（ASR/TTS 共用）
    api-secret: NGIzMDgyM2RhMTg0NDFkN2MzNjVhNmQx  # 讯飞 APISecret
    voice-name: amanda                 # TTS 发音人: xiaoyan, xiaofeng, catherine, amanda 等
    speed: "50"
    volume: "50"

# 语音服务提供方配置
