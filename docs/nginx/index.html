<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent 智能体交互平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="chat-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <span>AI Agents</span>
        </div>
      </div>

      <div class="sidebar-section-label">智能体列表</div>
      <div class="agent-list" id="agentList"></div>

      <div class="sidebar-footer">
        <div class="user-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span id="userId"></span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-area">
      <!-- Header -->
      <header class="chat-header">
        <div class="chat-header-left">
          <h1 class="chat-title" id="chatTitle">AI Agent 智能体交互平台</h1>
          <span class="chat-subtitle" id="chatSubtitle"></span>
        </div>
        <div class="chat-header-right">
          <div class="connection-status" id="connectionStatus">
            <span class="status-dot"></span>
            <span>未连接</span>
          </div>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea">
        <!-- Empty state (shown/hidden via JS) -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
          <h2 class="empty-title">开始对话</h2>
          <p class="empty-desc" id="emptyDesc">从左侧选择一个智能体开始对话</p>
          <div class="quick-agents" id="quickAgents"></div>
        </div>

        <!-- Message list -->
        <div id="messageList"></div>

        <!-- Streaming indicator -->
        <div class="streaming-indicator hidden" id="streamingIndicator">
          <div class="streaming-dot"></div>
          <div class="streaming-dot"></div>
          <div class="streaming-dot"></div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-container" id="inputContainer">
          <textarea
            id="chatInput"
            class="chat-textarea"
            placeholder="请先在左侧选择一个智能体..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
