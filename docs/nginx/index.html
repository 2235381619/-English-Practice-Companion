<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent 智能体交互平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" class="chat-layout">
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>AI Agents</span>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-mode="chat" onclick="switchMode('chat')">💬 Chat</button>
      <button class="nav-tab" data-mode="practice" onclick="switchMode('practice')">🎯 Practice</button>
    </div>
    <div class="nav-right"></div>
  </nav>

  <div id="chatMode" class="mode-panel">
    <aside class="sidebar">
      <div class="sidebar-section-label">智能体列表</div>
      <div class="agent-list" id="agentList"></div>
      <div class="sidebar-footer">
        <div class="user-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="userId">User</span>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <header class="chat-header">
        <div class="chat-header-left">
          <h1 class="chat-title" id="chatTitle">AI Agent 智能体交互平台</h1>
          <span class="chat-subtitle" id="chatSubtitle"></span>
        </div>
        <div class="chat-header-right">
          <div class="connection-status" id="connectionStatus">
            <span class="status-dot"></span>
            <span>未连接</span>
          </div>
        </div>
      </header>
      <div class="messages-area" id="messagesArea">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <h2 class="empty-title">开始对话</h2>
          <p class="empty-desc" id="emptyDesc">从左侧选择一个智能体开始对话</p>
          <div class="quick-agents" id="quickAgents"></div>
        </div>
        <div id="messageList"></div>
        <div class="streaming-indicator hidden" id="streamingIndicator">
          <div class="streaming-dot"></div><div class="streaming-dot"></div><div class="streaming-dot"></div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-container" id="inputContainer">
          <textarea id="chatInput" class="chat-textarea" placeholder="请先在左侧选择一个智能体..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <div id="practiceMode" class="mode-panel" style="display:none;">
    <main class="main-area practice-main">
      <header class="practice-header">
        <div class="practice-header-left">
          <h1 class="practice-title" id="practiceTitle">AI Voice Chat</h1>
          <span class="practice-scenario" id="practiceScenario"></span>
        </div>
        <div class="practice-header-right">
          <button id="practiceEndBtn" class="practice-end-btn" style="display:none;" onclick="endPracticeSession()">End Session</button>
        </div>
      </header>

      <div id="scenarioSelection" class="scenario-selection">
        <div class="scenario-bg-glow"></div>
          <div class="scenario-cards" id="scenarioCards"></div>
        <h2 class="scenario-heading">AI Voice Chat</h2>
        <p class="scenario-subtitle"></p>
      </div>

            <div id="practiceSession" class="practice-session-content" style="display:none;">
        <div class="practice-body">
          <div class="practice-conversation" id="practiceConversation">
            <div class="conversation-empty" id="conversationEmpty">
              <p>Start speaking or type your first message</p>
            </div>
            <div id="practiceMessageList"></div>
            <div class="streaming-indicator hidden" id="practiceStreaming">
              <div class="streaming-dot"></div><div class="streaming-dot"></div><div class="streaming-dot"></div>
            </div>
          </div>
          <div class="practice-panel" id="practicePanel">
            <div class="practice-panel-section">
              <div class="practice-panel-section-title">Voice</div>
              <div class="voice-slider-row">
                <label>Speed</label>
                <input type="range" class="voice-slider" id="voiceSpeed" min="0" max="100" value="50">
                <span class="voice-slider-value" id="voiceSpeedVal">50</span>
              </div>
              <div class="voice-slider-row">
                <label>Volume</label>
                <input type="range" class="voice-slider" id="voiceVolume" min="0" max="100" value="50">
                <span class="voice-slider-value" id="voiceVolumeVal">50</span>
              </div>
              <div class="voice-slider-row">
                <label>Pitch</label>
                <input type="range" class="voice-slider" id="voicePitch" min="0" max="100" value="50">
                <span class="voice-slider-value" id="voicePitchVal">50</span>
            </div>
            <div class="practice-panel-section">
              <div class="practice-panel-section-title">Pronunciation</div>
              <div id="panelRadarChart" style="padding:10px 0"><svg width="200" height="200" viewBox="0 0 200 200" style="display:block;margin:0 auto"><circle cx="100" cy="100" r="21.7" fill="none" stroke="#e2e8f0" stroke-width="1"/><circle cx="100" cy="100" r="43.3" fill="none" stroke="#e2e8f0" stroke-width="1"/><circle cx="100" cy="100" r="65" fill="none" stroke="#e2e8f0" stroke-width="1"/><line x1="100" y1="100" x2="100" y2="35" stroke="#e2e8f0" stroke-width="1"/><line x1="100" y1="100" x2="165" y2="100" stroke="#e2e8f0" stroke-width="1"/><line x1="100" y1="100" x2="100" y2="165" stroke="#e2e8f0" stroke-width="1"/><line x1="100" y1="100" x2="35" y2="100" stroke="#e2e8f0" stroke-width="1"/><polygon points="100,67.5 132.5,100 100,132.5 67.5,100" fill="rgba(148,163,184,0.1)" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="100" cy="67.5" r="3" fill="#cbd5e1" opacity="0.5"/><circle cx="132.5" cy="100" r="3" fill="#cbd5e1" opacity="0.5"/><circle cx="100" cy="132.5" r="3" fill="#cbd5e1" opacity="0.5"/><circle cx="67.5" cy="100" r="3" fill="#cbd5e1" opacity="0.5"/><text x="100" y="17" text-anchor="middle" font-size="12" fill="#94a3b8" style="font-family:sans-serif;font-weight:500">Accuracy</text><text x="185" y="104" text-anchor="middle" font-size="12" fill="#94a3b8" style="font-family:sans-serif;font-weight:500">Fluency</text><text x="100" y="191" text-anchor="middle" font-size="12" fill="#94a3b8" style="font-family:sans-serif;font-weight:500">Integrity</text><text x="15" y="104" text-anchor="middle" font-size="12" fill="#94a3b8" style="font-family:sans-serif;font-weight:500">Total</text></svg></div>
            </div>
            <button class="export-btn" onclick="exportSession()" id="exportBtn" style="margin-top:auto">Download Chat</button>
            </div>
          </div>
        </div>
      </div>

      <div class="visualizer" id="practiceVisualizer" style="display:none;width:100%;height:48px;background:#f8fafc;border-radius:8px;overflow:hidden;margin:0 20px">
        <canvas id="waveCanvas" style="width:100%;height:100%;display:block"></canvas>
      </div>

<div id="practiceInput" class="practice-input-area" style="display:none;">
        <div class="practice-input-row">
          <input id="practiceTextInput" class="practice-text-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPracticeText()}"/>
          <button id="practiceMicBtn" class="practice-mic-btn" onclick="toggleRecording()" title="Start recording">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
          </button>
          <button class="practice-send-btn" onclick="sendPracticeText()" id="practiceSendBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="app.js"></script>
<script src="practice.js"></script>
</body>
</html>
